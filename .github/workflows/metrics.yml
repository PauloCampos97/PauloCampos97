name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          filename: metrics/general.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          filename: metrics/languages.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          filename: metrics/achievements.svg

      - uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: PauloCampos97
          template: classic
          base: ""
          plugin_skyline: yes
          plugin_skyline_year: 2026
          plugin_skyline_frames: 6
          plugin_skyline_quality: 1
          filename: metrics/skyline.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          filename: metrics/habits.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_calendar: yes
          plugin_calendar_limit: 2
          filename: metrics/calendar.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_repositories: yes
          plugin_repositories_pinned: 6
          filename: metrics/repositories.svg

      - uses: lowlighter/metrics@latest
        with:
          token: NOT_NEEDED
          user: PauloCampos97
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_API_KEY }}
          plugin_wakatime_days: 7
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_limit: 5
          filename: metrics/wakatime.svg
