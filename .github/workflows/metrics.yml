name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  overview:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          filename: metrics/overview.svg

          # Languages
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_languages_limit: 6
          plugin_languages_sections: most-used
          plugin_languages_indepth: yes
          plugin_languages_recent_load: 500
          plugin_languages_recent_days: 90

          # Contribution Calendar (compact)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

  extras:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          filename: metrics/extras.svg

          # Achievements
          plugin_achievements: yes
          plugin_achievements_only: >
            polyglot, stargazer, sponsor, deploy, member,
            maintainer, developer, scripter, contributor, influencer,
            organizer, manager, verified, worker, apprentice, explorer,
            investor, collaborator, hacker, lover
          plugin_achievements_display: compact
          plugin_achievements_threshold: C

          # Follow-up (issues/PRs)
          plugin_followup: yes
          plugin_followup_sections: repositories

          # Lines of code changed
          plugin_lines: yes

          # Notable contributions
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_repositories: yes
