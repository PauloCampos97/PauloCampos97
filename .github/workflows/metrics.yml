name: Metrics
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate overview.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: header
          config_order: base.header, achievements, languages, habits, followup, lines
          config_padding: "0, 8 + 11%"
          config_timezone: America/Sao_Paulo
          filename: metrics/overview.svg
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_threshold: C
          plugin_languages: yes
          plugin_languages_display: compact
          plugin_languages_limit: 6
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_ignored: html, css
          plugin_habits: yes
          plugin_habits_display: compact
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_followup: yes
          plugin_followup_sections: user
          plugin_lines: yes
          plugin_achievements_secrets: ${{ secrets.METRICS_TOKEN }}
          plugin_languages_indepth: yes
          plugin_languages_skipped: ${{ github.repository_owner }}/${{ github.event.repository.name }}
          plugin_lines_history_limit: 1
          commits_authoring: ${{ github.repository_owner }}

      - name: Generate extras.svg
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: ""
          config_order: stars, notable, activity
          config_padding: "0, 8 + 11%"
          config_timezone: America/Sao_Paulo
          filename: metrics/extras.svg
          plugin_stars: yes
          plugin_stars_limit: 4
          plugin_stars_display: compact
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_repositories: yes
          plugin_activity: yes
          plugin_activity_limit: 5

      - name: Commit SVGs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update metrics SVGs"
          file_pattern: metrics/*.svg
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
