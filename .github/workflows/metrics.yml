name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo
          filename: metrics-general.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_languages: yes
          plugin_languages_details: percentage, bytes-size
          plugin_languages_limit: 8
          filename: metrics-languages.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          filename: metrics-achievements.svg

      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: PauloCampos97
          template: classic
          base: ""
          config_timezone: America/Sao_Paulo
          plugin_skyline: yes
          plugin_skyline_year: 2024
          plugin_skyline_quality: 1
          plugin_skyline_frames: 2
          plugin_skyline_format: png
          filename: metrics-skyline.svg
