name: Generate Snake Animation
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      - name: Copy SVGs to assets
        run: |
          cp dist/snake.svg assets/snake.svg
          cp dist/snake-dark.svg assets/snake-dark.svg

      - name: Commit snake SVGs
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "chore: update snake animation [skip ci]"
          file_pattern: assets/snake*.svg
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
