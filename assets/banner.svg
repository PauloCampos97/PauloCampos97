<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1000 280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#152039"/>
      <stop offset="40%" style="stop-color:#1a2a45"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf3b48"/>
      <stop offset="50%" style="stop-color:#d94f5c"/>
      <stop offset="100%" style="stop-color:#bf3b48"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#bf3b48;stop-opacity:0"/>
      <stop offset="15%" style="stop-color:#bf3b48;stop-opacity:1"/>
      <stop offset="85%" style="stop-color:#bf3b48;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#bf3b48;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="280" fill="url(#bgGrad)" rx="8"/>

  <!-- Decorative elements -->
  <circle cx="50" cy="50" r="120" fill="#bf3b48" opacity="0.03"/>
  <circle cx="950" cy="230" r="150" fill="#bf3b48" opacity="0.03"/>
  <circle cx="500" cy="140" r="200" fill="#152039" opacity="0.3"/>

  <!-- Accent line -->
  <rect x="150" y="225" width="700" height="2.5" rx="1.25" fill="url(#lineGrad)"/>

  <!-- Name -->
  <text x="500" y="110" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" letter-spacing="2">
    Paulo Campos
  </text>

  <!-- Role -->
  <text x="500" y="155" text-anchor="middle" fill="#9ca3af" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" letter-spacing="1">
    Full Stack Developer
  </text>

  <!-- Tags -->
  <g filter="url(#glow)">
    <text x="500" y="195" text-anchor="middle" fill="#bf3b48" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" letter-spacing="2">
      ARCHITECTURE  •  SAAS  •  PERFORMANCE  •  SECURITY
    </text>
  </g>
</svg>
