<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="auto" viewBox="0 0 1000 280">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f192e"/>
      <stop offset="35%" stop-color="#152039"/>
      <stop offset="70%" stop-color="#1a2a45"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf3b48"/>
      <stop offset="50%" stop-color="#d94f5c"/>
      <stop offset="100%" stop-color="#bf3b48"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf3b48" stop-opacity="0"/>
      <stop offset="10%" stop-color="#bf3b48" stop-opacity="1"/>
      <stop offset="90%" stop-color="#bf3b48" stop-opacity="1"/>
      <stop offset="100%" stop-color="#bf3b48" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.03"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1000" height="280" fill="url(#bgGrad)" rx="12"/>
  <rect width="1000" height="280" fill="url(#grid)" rx="12"/>

  <!-- Decorative elements -->
  <circle cx="80" cy="60" r="140" fill="#bf3b48" opacity="0.04"/>
  <circle cx="920" cy="220" r="180" fill="#bf3b48" opacity="0.03"/>
  <circle cx="500" cy="140" r="220" fill="#152039" opacity="0.25"/>

  <!-- Small accent dots -->
  <circle cx="120" cy="200" r="3" fill="#bf3b48" opacity="0.3"/>
  <circle cx="880" cy="80" r="2.5" fill="#bf3b48" opacity="0.25"/>
  <circle cx="200" cy="60" r="2" fill="#bf3b48" opacity="0.2"/>
  <circle cx="800" cy="210" r="2" fill="#bf3b48" opacity="0.2"/>

  <!-- Accent line (top decorative) -->
  <rect x="0" y="0" width="1000" height="3" fill="url(#accentGrad)"/>

  <!-- Name -->
  <text x="500" y="105" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="1.5">
    Paulo Campos
  </text>

  <!-- Role -->
  <text x="500" y="150" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" letter-spacing="3">
    FULL STACK DEVELOPER
  </text>

  <!-- Tags -->
  <g filter="url(#glow)">
    <text x="500" y="195" text-anchor="middle" fill="#bf3b48" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="500" letter-spacing="3.5">
      ARCHITECTURE  •  SAAS  •  PERFORMANCE  •  SECURITY
    </text>
  </g>

  <!-- Accent divider bar -->
  <rect x="200" y="228" width="600" height="1.5" rx="0.75" fill="url(#lineGrad)"/>

  <!-- Small badge at bottom right -->
  <text x="950" y="260" text-anchor="end" fill="#bf3b48" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" letter-spacing="2.5" opacity="0.7">
    ALPAR
  </text>
</svg>
