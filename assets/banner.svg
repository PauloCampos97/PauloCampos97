<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#152039"/>
      <stop offset="50%" stop-color="#0F1829"/>
      <stop offset="100%" stop-color="#152039"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bf3b48" stop-opacity="0.0"/>
      <stop offset="15%" stop-color="#bf3b48" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#bf3b48" stop-opacity="0.3"/>
      <stop offset="85%" stop-color="#bf3b48" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#bf3b48" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#bf3b48" stroke-width="0.5">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
    <line x1="1000" y1="0" x2="1000" y2="280"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accentGrad)"/>

  <!-- Left decorative bar -->
  <rect x="40" y="70" width="3" height="140" rx="1.5" fill="#bf3b48"/>

  <!-- Name -->
  <text x="68" y="145" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" letter-spacing="6">
    PAULO CAMPOS
  </text>

  <!-- Accent dots left -->
  <circle cx="52" cy="70" r="3" fill="#bf3b48" opacity="0.6"/>
  <circle cx="52" cy="210" r="3" fill="#bf3b48" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="68" y="182" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" font-size="17" font-weight="400" fill="#bf3b48" letter-spacing="4">
    FULL STACK DEVELOPER
  </text>

  <!-- Tags row -->
  <text x="68" y="218" font-family="'Segoe UI', -apple-system, Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#6b7280" letter-spacing="2">
    ARQUITETURA DE SOFTWARE  ·  SAAS MULTI-TENANT  ·  ERP  ·  NEXT.JS  ·  NODE.JS  ·  TYPESCRIPT  ·  POSTGRESQL
  </text>

  <!-- Right decorative elements -->
  <g opacity="0.04">
    <rect x="900" y="50" width="260" height="180" rx="8" fill="none" stroke="#bf3b48" stroke-width="1"/>
    <rect x="920" y="70" width="220" height="140" rx="4" fill="none" stroke="#bf3b48" stroke-width="0.5"/>
    <!-- Code-like lines -->
    <rect x="940" y="90" width="100" height="2" rx="1" fill="#bf3b48"/>
    <rect x="940" y="100" width="150" height="2" rx="1" fill="#bf3b48"/>
    <rect x="940" y="110" width="80" height="2" rx="1" fill="#bf3b48" opacity="0.5"/>
    <rect x="940" y="130" width="120" height="2" rx="1" fill="#bf3b48"/>
    <rect x="940" y="140" width="60" height="2" rx="1" fill="#bf3b48" opacity="0.5"/>
    <rect x="940" y="150" width="140" height="2" rx="1" fill="#bf3b48"/>
    <rect x="940" y="170" width="90" height="2" rx="1" fill="#bf3b48"/>
    <rect x="940" y="180" width="160" height="2" rx="1" fill="#bf3b48"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="278" width="1200" height="2" fill="url(#accentGrad)"/>
</svg>
