<svg width="860" height="330" viewBox="0 0 860 330" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBorder" x1="0" y1="0" x2="860" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <clipPath id="round"><rect x="2" y="2" width="856" height="326" rx="14"/></clipPath>
  </defs>

  <!-- borda gradiente -->
  <rect x="1" y="1" width="858" height="328" rx="15" stroke="url(#termBorder)" stroke-width="1.5" fill="#0A0F1F"/>

  <g clip-path="url(#round)">
    <!-- barra de título -->
    <rect x="2" y="2" width="856" height="42" fill="#0F172A"/>
    <circle cx="28" cy="23" r="6" fill="#F87171"/>
    <circle cx="50" cy="23" r="6" fill="#FBBF24"/>
    <circle cx="72" cy="23" r="6" fill="#34D399"/>
    <text x="430" y="28" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#64748B">paulo@dev: ~/whoami</text>

    <!-- linha 1 -->
    <g font-family="'Courier New', monospace" font-size="15">
      <text x="28" y="76" fill="#34D399">➜</text>
      <text x="48" y="76" fill="#38BDF8">~</text>
      <text x="66" y="76" fill="#E2E8F0">whoami --verbose</text>

      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="0.8s" dur="0.1s" fill="freeze"/>
        <text x="28" y="108" fill="#C084FC">{</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="1.2s" dur="0.1s" fill="freeze"/>
        <text x="52" y="134" fill="#38BDF8">"role"</text>
        <text x="116" y="134" fill="#475569">:</text>
        <text x="130" y="134" fill="#A5F3FC">"Full Stack Developer"</text><text x="345" y="134" fill="#475569">,</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="1.7s" dur="0.1s" fill="freeze"/>
        <text x="52" y="160" fill="#38BDF8">"foco"</text>
        <text x="112" y="160" fill="#475569">:</text>
        <text x="126" y="160" fill="#A5F3FC">["Arquitetura SaaS", "Multi-tenancy", "Performance"]</text><text x="635" y="160" fill="#475569">,</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="2.2s" dur="0.1s" fill="freeze"/>
        <text x="52" y="186" fill="#38BDF8">"missao"</text>
        <text x="132" y="186" fill="#475569">:</text>
        <text x="146" y="186" fill="#A5F3FC">"Código limpo, testes sólidos, arquitetura bem definida"</text><text x="690" y="186" fill="#475569">,</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="2.7s" dur="0.1s" fill="freeze"/>
        <text x="52" y="212" fill="#38BDF8">"principios"</text>
        <text x="168" y="212" fill="#475569">:</text>
        <text x="182" y="212" fill="#A5F3FC">["performance", "seguranca", "escalabilidade"]</text>
      </g>
      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="3.1s" dur="0.1s" fill="freeze"/>
        <text x="28" y="238" fill="#C084FC">}</text>
      </g>

      <g opacity="0">
        <animate attributeName="opacity" values="0;1" begin="3.6s" dur="0.1s" fill="freeze"/>
        <text x="28" y="284" fill="#34D399">➜</text>
        <text x="48" y="284" fill="#38BDF8">~</text>
      </g>
      <!-- cursor piscando -->
      <rect x="70" y="271" width="10" height="17" fill="#22D3EE" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;1;0;1;0" begin="3.6s" dur="2.4s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
