<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#060913"/>
      <stop offset="0.5" stop-color="#0A0F1F"/>
      <stop offset="1" stop-color="#060913"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#818CF8"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#C084FC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#22D3EE" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.6" opacity="0.55"/>
    </pattern>
  </defs>

  <!-- fundo -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- orbes de luz -->
  <circle cx="180" cy="80" r="220" fill="url(#orb1)">
    <animate attributeName="cx" values="180;260;180" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1020" cy="250" r="260" fill="url(#orb2)">
    <animate attributeName="cy" values="250;180;250" dur="11s" repeatCount="indefinite"/>
  </circle>

  <!-- moldura tech nos cantos -->
  <path d="M28 60 V28 H60" stroke="#22D3EE" stroke-width="2" opacity="0.8"/>
  <path d="M1172 60 V28 H1140" stroke="#C084FC" stroke-width="2" opacity="0.8"/>
  <path d="M28 260 V292 H60" stroke="#C084FC" stroke-width="2" opacity="0.8"/>
  <path d="M1172 260 V292 H1140" stroke="#22D3EE" stroke-width="2" opacity="0.8"/>

  <!-- tag decorativa -->
  <text x="600" y="112" text-anchor="middle" font-family="'Courier New', monospace" font-size="15" fill="#38BDF8" letter-spacing="6" opacity="0.85">&lt;/&gt; SYSTEM.ONLINE</text>

  <!-- nome -->
  <text x="600" y="178" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="4" fill="url(#nameGrad)" filter="url(#glow)">PAULO CAMPOS</text>

  <!-- subtítulo -->
  <text x="600" y="218" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="17" font-weight="600" letter-spacing="10" fill="#94A3B8">FULL STACK DEVELOPER</text>

  <!-- tags -->
  <text x="600" y="256" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" letter-spacing="3" fill="#64748B">ARQUITETURA ◆ SAAS ◆ PERFORMANCE ◆ SEGURANÇA</text>

  <!-- linha inferior animada -->
  <rect x="0" y="308" width="1200" height="2" fill="url(#lineGrad)">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
  </rect>

  <!-- scanline -->
  <rect x="0" y="0" width="1200" height="3" fill="#22D3EE" opacity="0.10">
    <animate attributeName="y" values="0;317;0" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- partículas -->
  <circle cx="150" cy="230" r="2" fill="#22D3EE">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1060" cy="90" r="2" fill="#C084FC">
    <animate attributeName="opacity" values="1;0.2;1" dur="3.1s" repeatCount="indefinite"/>
  </circle>
  <circle cx="900" cy="270" r="1.6" fill="#38BDF8">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="320" cy="70" r="1.6" fill="#818CF8">
    <animate attributeName="opacity" values="1;0.3;1" dur="3.6s" repeatCount="indefinite"/>
  </circle>
</svg>
